<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roommate Matcher</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <style>
        body {
            padding-top: 2rem;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 900px;
        }
        .card {
            margin-bottom: 2rem;
        }
        #result-area {
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4 text-center">Roommate Matcher</h1>
        
        <div class="card">
            <div class="card-header bg-primary text-white">
                Input Data
            </div>
            <div class="card-body">
                <p class="card-text text-muted">
                    Copy and paste from a spreadsheet. 
                    Columns should be: <b>Name</b>, <b>Preferred Roommates</b> (comma-separated), and optionally <b>Avoid</b> (comma-separated).
                    Rows should be separated by newlines, and columns by tabs (standard spreadsheet behavior).
                </p>
                <div class="mb-3">
                    <label for="student-data" class="form-label">Student List</label>
                    <textarea class="form-control" id="student-data" rows="8" placeholder="Alice	Bob, Charlie	David
Bob	Alice, Charlie	
Charlie	Alice, Bob	
David	Eve	Alice"></textarea>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="room-size" class="form-label">Room Size</label>
                        <input type="number" class="form-control" id="room-size" value="4" min="1">
                    </div>
                    <div class="col-md-6">
                        <div class="form-check mt-4">
                            <input class="form-check-input" type="checkbox" value="" id="require-mutual" checked>
                            <label class="form-check-label" for="require-mutual">
                                Prefer Mutual Roommates (Strong weighting)
                            </label>
                        </div>
                    </div>
                </div>
                
                <div class="d-grid gap-2">
                    <button id="match-btn" class="btn btn-success btn-lg">Match Students</button>
                </div>
            </div>
        </div>

        <div id="results-card" class="card d-none">
            <div class="card-header bg-success text-white">
                Matched Rooms
            </div>
            <div class="card-body">
                <div id="result-area"></div>
            </div>
        </div>
        
        <div id="error-card" class="card d-none border-danger">
            <div class="card-header bg-danger text-white">
                Error
            </div>
            <div class="card-body" id="error-area">
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('match-btn').addEventListener('click', () => {
            const dataText = document.getElementById('student-data').value.trim();
            const roomSize = parseInt(document.getElementById('room-size').value) || 4;
            const preferMutual = document.getElementById('require-mutual').checked;
            
            if (!dataText) {
                showError("Please enter some student data.");
                return;
            }

            try {
                const students = parseData(dataText);
                if (students.length === 0) {
                    showError("No valid student data found.");
                    return;
                }
                const rooms = performMatching(students, roomSize, preferMutual);
                displayResults(rooms);
            } catch (e) {
                showError("Error processing data: " + e.message);
                console.error(e);
            }
        });

        function parseData(text) {
            const lines = text.split(/\r?\n/);
            const students = [];
            
            lines.forEach(line => {
                if (!line.trim()) return;
                const cols = line.split('\t');
                const name = cols[0] ? cols[0].trim() : "";
                if (!name) return;
                
                const preferred = cols[1] ? cols[1].split(',').map(s => s.trim()).filter(s => s) : [];
                const avoid = cols[2] ? cols[2].split(',').map(s => s.trim()).filter(s => s) : [];
                
                students.push({
                    name,
                    preferred,
                    avoid
                });
            });
            return students;
        }

        function performMatching(students, roomSize, preferMutual) {
            const studentMap = new Map();
            students.forEach(s => studentMap.set(s.name, s));
            
            // Normalize names in preferred/avoid lists to match existing students
            students.forEach(s => {
                s.preferred = s.preferred.filter(p => studentMap.has(p));
                s.avoid = s.avoid.filter(a => studentMap.has(a));
            });

            // Run multiple iterations and keep the best one
            let bestRooms = null;
            let bestOverallScore = -Infinity;
            const iterations = 100;

            for (let iter = 0; iter < iterations; iter++) {
                let unassigned = [...students];
                // Shuffle for different starting points each iteration
                // except the first one which we can keep sorted for stability
                if (iter > 0) {
                    for (let i = unassigned.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [unassigned[i], unassigned[j]] = [unassigned[j], unassigned[i]];
                    }
                } else {
                    unassigned.sort((a, b) => (b.preferred.length + b.avoid.length) - (a.preferred.length + a.avoid.length));
                }

                const currentIterationRooms = [];
                while (unassigned.length > 0) {
                    let currentRoom = [unassigned.shift()];
                    
                    while (currentRoom.length < roomSize && unassigned.length > 0) {
                        let bestCandidateIndex = -1;
                        let bestScore = -Infinity;

                        for (let i = 0; i < unassigned.length; i++) {
                            const candidate = unassigned[i];
                            let score = calculateScore(candidate, currentRoom, studentMap, preferMutual);
                            
                            // Boost candidates that satisfy SOMEONE in the current room
                            // AND boost if the candidate's preferences are satisfied
                            for (const roomie of currentRoom) {
                                if (candidate.preferred.includes(roomie.name)) {
                                    score += 15; // Candidate gets a preference
                                }
                                if (roomie.preferred.includes(candidate.name)) {
                                    score += 15; // Roomie gets a preference
                                }
                            }

                            // Small tie-breaker
                            score += (candidate.preferred.length * 0.1);

                            if (score > bestScore) {
                                bestScore = score;
                                bestCandidateIndex = i;
                            }
                        }

                        if (bestCandidateIndex !== -1 && bestScore > -500000) {
                            currentRoom.push(unassigned.splice(bestCandidateIndex, 1)[0]);
                        } else {
                            break;
                        }
                    }
                    currentIterationRooms.push(currentRoom);
                }

                // Evaluate iteration quality
                let iterationScore = evaluateRooms(currentIterationRooms, studentMap, preferMutual);
                if (iterationScore > bestOverallScore) {
                    bestOverallScore = iterationScore;
                    bestRooms = currentIterationRooms;
                }
            }

            // Perform local search (swaps) to improve the best result
            if (bestRooms) {
                bestRooms = improveRooms(bestRooms, studentMap, preferMutual, roomSize);
            }
            
            return bestRooms;
        }

        function improveRooms(rooms, studentMap, preferMutual, roomSize) {
            let currentBestScore = evaluateRooms(rooms, studentMap, preferMutual);
            let improved = true;

            // Simple hill climbing: try swapping students between rooms
            while (improved) {
                improved = false;
                for (let i = 0; i < rooms.length; i++) {
                    for (let j = i + 1; j < rooms.length; j++) {
                        for (let ki = 0; ki < rooms[i].length; ki++) {
                            for (let kj = 0; kj < rooms[j].length; kj++) {
                                // Swap rooms[i][ki] and rooms[j][kj]
                                let temp = rooms[i][ki];
                                rooms[i][ki] = rooms[j][kj];
                                rooms[j][kj] = temp;

                                let newScore = evaluateRooms(rooms, studentMap, preferMutual);
                                if (newScore > currentBestScore) {
                                    currentBestScore = newScore;
                                    improved = true;
                                } else {
                                    // Swap back
                                    temp = rooms[i][ki];
                                    rooms[i][ki] = rooms[j][kj];
                                    rooms[j][kj] = temp;
                                }
                            }
                        }
                    }
                }
            }
            return rooms;
        }

        function evaluateRooms(rooms, studentMap, preferMutual) {
            let totalScore = 0;
            let zeroPrefMatches = 0;

            rooms.forEach(room => {
                room.forEach(student => {
                    let matchedWithPref = false;
                    room.forEach(roomie => {
                        if (student === roomie) return;
                        
                        const wants = student.preferred.includes(roomie.name);
                        const wantedBy = roomie.preferred.includes(student.name);

                        if (wants && wantedBy) {
                            totalScore += preferMutual ? 200 : 50;
                            matchedWithPref = true;
                        } else if (wants || wantedBy) {
                            totalScore += 20;
                            if (wants) matchedWithPref = true;
                        } else {
                            totalScore += 1;
                        }
                        
                        // Hard penalty if avoidance is violated (though current greedy avoids it)
                        if (student.avoid.includes(roomie.name) || roomie.avoid.includes(student.name)) {
                            totalScore -= 1000000;
                        }
                    });
                    
                    if (student.preferred.length > 0 && !matchedWithPref) {
                        zeroPrefMatches++;
                    }
                });
            });

            // Extra heavy penalty for anyone not getting any of their preferences
            // and additional bonus for each student having at least one match
            totalScore -= (zeroPrefMatches * 20000);
            
            return totalScore;
        }

        function calculateScore(candidate, currentRoom, studentMap, preferMutual) {
            let score = 0;
            
            for (const roomie of currentRoom) {
                // Hard avoidance check
                if (candidate.avoid.includes(roomie.name) || roomie.avoid.includes(candidate.name)) {
                    return -1000000; // Large penalty for avoidance
                }

                // Preference scores
                const candidateWantsRoomie = candidate.preferred.includes(roomie.name);
                const roomieWantsCandidate = roomie.preferred.includes(candidate.name);

                if (candidateWantsRoomie && roomieWantsCandidate) {
                    score += preferMutual ? 200 : 50; // Higher weight for mutual
                } else if (candidateWantsRoomie || roomieWantsCandidate) {
                    score += 20; // One-way preference
                } else {
                    // No preference either way
                    score += 1; // Slight nudge to at least group people
                }
            }
            
            return score;
        }

        function displayResults(rooms) {
            const resultArea = document.getElementById('result-area');
            const resultsCard = document.getElementById('results-card');
            const errorCard = document.getElementById('error-card');
            
            errorCard.classList.add('d-none');
            resultsCard.classList.remove('d-none');
            
            let html = "";
            rooms.forEach((room, index) => {
                html += `<h5>Room ${index + 1}</h5>`;
                html += `<ul>`;
                room.forEach(s => {
                    html += `<li>${s.name}</li>`;
                });
                html += `</ul>`;
            });
            
            resultArea.innerHTML = html;
        }

        function showError(msg) {
            const errorArea = document.getElementById('error-area');
            const errorCard = document.getElementById('error-card');
            const resultsCard = document.getElementById('results-card');
            
            resultsCard.classList.add('d-none');
            errorCard.classList.remove('d-none');
            errorArea.innerText = msg;
        }
    </script>
</body>
</html>
